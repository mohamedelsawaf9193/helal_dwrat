<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>نتائج الدورة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background-image:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://raw.githubusercontent.com/xhhp1/medicaljpg/main/medic.jpg.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:white;
min-height:100vh;
}

.overlay{
min-height:100vh;
padding:40px;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:900px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
border-radius:20px;
padding:35px;
box-shadow:0 15px 45px rgba(0,0,0,0.8);
border:1px solid rgba(255,255,255,0.05);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-weight:700;
font-size:26px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tabs button{
flex:1;
}

label{
display:block;
margin-top:18px;
margin-bottom:6px;
font-size:14px;
}

textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #333;
background:#141414;
color:white;
font-family:'Cairo',sans-serif;
font-size:14px;
height:220px;
resize:none;
}

button{
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0099ff,#00e0ff);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:20px;
background:#0a0a0a;
padding:20px;
border-radius:12px;
white-space:pre-wrap;
border:1px solid #333;
line-height:1.7;
}



</body>
</html>
