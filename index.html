<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>نتائج الدورة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background-image:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://raw.githubusercontent.com/xhhp1/medicaljpg/main/medic.jpg.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:white;
min-height:100vh;
}

.overlay{
min-height:100vh;
padding:40px;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:900px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
border-radius:20px;
padding:35px;
box-shadow:0 15px 45px rgba(0,0,0,0.8);
border:1px solid rgba(255,255,255,0.05);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-weight:700;
font-size:26px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tabs button{
flex:1;
}

label{
display:block;
margin-top:18px;
margin-bottom:6px;
font-size:14px;
}

textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #333;
background:#141414;
color:white;
font-family:'Cairo',sans-serif;
font-size:14px;
height:220px;
resize:none;
}

button{
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0099ff,#00e0ff);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:20px;
background:#0a0a0a;
padding:20px;
border-radius:12px;
white-space:pre-wrap;
border:1px solid #333;
line-height:1.7;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<div class="header">
<h1>الناجحين في الدورة</h1>
</div>

<div class="tabs">
<button onclick="showTab('pass')">الناجحين</button>
<button onclick="showTab('wrong')">الكوبي اي دي غير واقعى</button>
</div>

<label>الصق البيانات هنا</label>
<textarea id="data"></textarea>

<button onclick="generate()">استخراج النتائج</button>
<button id="copyBtn" onclick="copyResult()">نسخ النتيجة</button>

<div id="passTab" class="result"></div>
<div id="wrongTab" class="result" style="display:none"></div>

</div>

</div>

<script>

let currentTab="pass"

function extractID(line){
let match=line.match(/\d{17,19}/)
return match ? match[0] : null
}

function extractScore(line){
let score=line.match(/(\d+)\s*\/\s*20/)
if(score){
return parseInt(score[1])
}
return null
}

function extractNameCode(line){

let parts=line.split(/\t+/)

let name=parts[2] || ""
let code=parts[3] || ""

return name + " - " + code.toUpperCase()

}

function generate(){

let lines=document.getElementById("data").value.split("\n")

let passed=[]
let wrong=[]

lines.forEach(line=>{

let score=extractScore(line)

if(score===null) return

if(score>=15){

let id=extractID(line)

if(id){

passed.push("<@"+id+">")

}else{

wrong.push(extractNameCode(line))

}

}

})

document.getElementById("passTab").textContent=passed.join("\n\n")
document.getElementById("wrongTab").textContent=wrong.join("\n")

}

function showTab(tab){

currentTab=tab

let pass=document.getElementById("passTab")
let wrong=document.getElementById("wrongTab")

if(tab==="pass"){
pass.style.display="block"
wrong.style.display="none"
}else{
pass.style.display="none"
wrong.style.display="block"
}

}

function copyResult(){

let element=currentTab==="pass"
?document.getElementById("passTab")
:document.getElementById("wrongTab")

let text=element.textContent

let btn=document.getElementById("copyBtn")

if(!text){

btn.innerText="لا يوجد نتيجة"

setTimeout(()=>{
btn.innerText="نسخ النتيجة"
},2000)

return
}

navigator.clipboard.writeText(text)

btn.innerText="✓ تم النسخ"

setTimeout(()=>{
btn.innerText="نسخ النتيجة"
},2000)

}

</script>

</body>
</html>
